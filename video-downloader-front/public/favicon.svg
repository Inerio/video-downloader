      <stop offset="0%" style="stop-color:#1C1B18"/>
      <stop offset="100%" style="stop-color:#111110"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#8B7335"/>
