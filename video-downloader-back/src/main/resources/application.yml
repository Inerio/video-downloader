server:
  port: 8080

cors:
  allowed-origins: http://localhost:4200

ytdlp:
  path: yt-dlp
  temp-dir: ${java.io.tmpdir}/videograb
  timeout: 120
  max-filesize: 500M

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cache:
    type: caffeine
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

feedback:
  recipient: ${FEEDBACK_EMAIL:}
